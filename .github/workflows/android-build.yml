name: Android Build

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Build job ID'
        required: true
      source_url:
        description: 'Source URL (repo or protected zip url)'
        required: true
      source_type:
        description: 'github or zip'
        required: false
        default: 'github'
      upload_id:
        description: 'Optional upload id'
        required: false
        default: ''
      project_type:
        description: 'auto|capacitor|flutter|react-native|expo|gradle|unity'
        required: false
        default: 'auto'
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      build_type:
        description: 'Build type (apk or aab)'
        required: true
        default: 'apk'
      project_path:
        description: 'Optional project subdirectory path'
        required: false
        default: ''
      callback_url:
        description: 'Callback URL to notify on completion'
        required: false

jobs:
  build:
    name: "Android Build - ${{ github.event.inputs.job_id }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fetch source
        run: |
          SOURCE_TYPE="${{ github.event.inputs.source_type }}"
          if [ "$SOURCE_TYPE" = "zip" ]; then
            curl -fL "${{ github.event.inputs.source_url }}" -o source.zip
            unzip -q source.zip -d source_unzipped
            rm -rf source
            mkdir -p source
            if [ -n "${{ github.event.inputs.project_path }}" ] && [ -d "source_unzipped/${{ github.event.inputs.project_path }}" ]; then
              cp -R "source_unzipped/${{ github.event.inputs.project_path }}/." source/
            else
              if [ -d source_unzipped/source ]; then cp -R source_unzipped/source/. source/; else cp -R source_unzipped/. source/; fi
            fi
            exit 0
          fi

          SOURCE_URL="${{ github.event.inputs.source_url }}"
          CLONE_BRANCH="${{ github.event.inputs.branch }}"

          # Handle GitHub tree URLs (e.g. github.com/user/repo/tree/branch/subdir)
          SUBDIR="${{ github.event.inputs.project_path }}"
          if [[ "$SOURCE_URL" == *"/tree/"* ]]; then
            REPO_PART=$(echo "$SOURCE_URL" | sed -E 's|(https://github.com/[^/]+/[^/]+)/tree/.*|\1|')
            BRANCH_AND_PATH=$(echo "$SOURCE_URL" | sed -E 's|https://github.com/[^/]+/[^/]+/tree/||')
            BRANCH_NAME=$(echo "$BRANCH_AND_PATH" | cut -d'/' -f1)
            SUBDIR=$(echo "$BRANCH_AND_PATH" | cut -d'/' -f2-)
            SOURCE_URL="$REPO_PART"
            if [ -n "$BRANCH_NAME" ]; then
              CLONE_BRANCH="$BRANCH_NAME"
            fi
            echo "Detected tree URL - repo: $REPO_PART, branch: $BRANCH_NAME, subdir: $SUBDIR"
          fi

          # Inject token for private GitHub repos
          if [[ "$SOURCE_URL" == *"github.com"* ]]; then
            SOURCE_URL=$(echo "$SOURCE_URL" | sed "s|https://github.com|https://x-access-token:${{ github.token }}@github.com|")
          fi

          git clone --branch "$CLONE_BRANCH" --depth 1 \
            "$SOURCE_URL" source_full

          # If subdir was specified, use only that subdirectory
          if [ -n "$SUBDIR" ] && [ -d "source_full/$SUBDIR" ]; then
            echo "Using subdirectory: $SUBDIR"
            cp -r "source_full/$SUBDIR" source
          else
            mv source_full source
          fi

      - name: Detect project structure
        id: detect
        run: |
          echo "=== Repository contents ==="
          ls -la source/

          PROJECT_TYPE="unknown"
          PROJECT_DIR="source"

          # --- 1. Check for Capacitor ---
          if [ -f "source/capacitor.config.ts" ] || [ -f "source/capacitor.config.json" ]; then
            PROJECT_TYPE="capacitor"
            echo "Detected Capacitor project"
          fi
          if [ "$PROJECT_TYPE" = "unknown" ] && [ -f "source/package.json" ]; then
            if grep -q '"@capacitor/core"' source/package.json 2>/dev/null && grep -q '"@capacitor/android"' source/package.json 2>/dev/null; then
              PROJECT_TYPE="capacitor"
              echo "Detected Capacitor project"
            fi
          fi

          # --- 2. Check for Expo / React Native ---
          if [ -f "source/package.json" ]; then
            if [ "$PROJECT_TYPE" = "unknown" ] && (grep -q '"expo"' source/package.json 2>/dev/null || [ -f "source/app.json" ]); then
              if grep -q '"expo"' source/package.json 2>/dev/null; then
                PROJECT_TYPE="expo"
                echo "Detected Expo (React Native) project"
              fi
            fi
            if [ "$PROJECT_TYPE" = "unknown" ] && grep -q '"react-native"' source/package.json 2>/dev/null; then
              PROJECT_TYPE="react-native"
              echo "Detected React Native project"
            fi
          fi

          # --- 3. Check for Flutter ---
          if [ "$PROJECT_TYPE" = "unknown" ]; then
            FLUTTER_LOCATIONS=(
              "source"
              "source/flutter_app"
              "source/mobile"
              "source/app_flutter"
            )
            for loc in "${FLUTTER_LOCATIONS[@]}"; do
              if [ -f "$loc/pubspec.yaml" ]; then
                PROJECT_DIR="$loc"
                PROJECT_TYPE="flutter"
                echo "Found Flutter project at: $loc"
                break
              fi
            done
            # Deep search
            if [ "$PROJECT_TYPE" = "unknown" ]; then
              FOUND=$(find source -name "pubspec.yaml" -maxdepth 3 | head -1)
              if [ -n "$FOUND" ]; then
                PROJECT_DIR=$(dirname "$FOUND")
                PROJECT_TYPE="flutter"
                echo "Auto-detected Flutter project at: $PROJECT_DIR"
              fi
            fi
          fi

          # --- 4. Check for Unity ---
          if [ "$PROJECT_TYPE" = "unknown" ] && [ "${{ github.event.inputs.project_type }}" = "unity" -o -f "source/ProjectSettings/ProjectVersion.txt" ] && [ -d "source/Assets" ] && [ -f "source/Packages/manifest.json" ]; then
            PROJECT_TYPE="unity"
            echo "Detected Unity project"
          fi

          # --- 5. Check for standalone Gradle ---
          if [ "$PROJECT_TYPE" = "unknown" ] && [ -f "source/gradlew" ]; then
            PROJECT_TYPE="gradle"
            echo "Detected native Android (Gradle) project"
          fi

          if [ "$PROJECT_TYPE" = "unknown" ]; then
            echo "::error::No supported project found. ThronosBuild supports: Capacitor, Flutter, React Native/Expo, Android Gradle."
            echo "Files found:" && find source -maxdepth 3 -type f | head -40
            exit 1
          fi

          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "type=$PROJECT_TYPE" >> $GITHUB_OUTPUT
          echo "Detected project type: $PROJECT_TYPE at $PROJECT_DIR"

      # ────────── Flutter Setup ──────────

      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Ensure Flutter Android project exists
        if: steps.detect.outputs.type == 'flutter'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ ! -f "android/app/build.gradle" ] || [ ! -f "android/settings.gradle" ]; then
            echo "::warning::Android project structure missing or incomplete. Regenerating..."
            APP_NAME=$(grep "^name:" pubspec.yaml | sed 's/name: *//' | tr -d ' \r')
            TEMP_DIR=$(mktemp -d)
            flutter create --org io.thronos --project-name "$APP_NAME" --platforms android "$TEMP_DIR/temp_app"
            rm -rf android
            cp -r "$TEMP_DIR/temp_app/android" android/
            rm -rf "$TEMP_DIR"
            echo "Android project structure regenerated"
          fi

      - name: Install Flutter dependencies
        if: steps.detect.outputs.type == 'flutter'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: flutter pub get

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter' && github.event.inputs.build_type == 'apk'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: flutter build apk --release

      - name: Build Flutter AAB
        if: steps.detect.outputs.type == 'flutter' && github.event.inputs.build_type == 'aab'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: flutter build appbundle --release

      # ────────── React Native / Expo Setup ──────────

      - name: Set up Node.js
        if: steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'react-native'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install JS dependencies
        if: steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'react-native'
        working-directory: source
        run: npm install

      - name: Patch expo-modules-core PermissionsService.kt
        if: steps.detect.outputs.type == 'expo'
        working-directory: source
        run: |
          PERMS="node_modules/expo-modules-core/android/src/main/java/expo/modules/adapters/react/permissions/PermissionsService.kt"
          if [ ! -f "$PERMS" ]; then echo "PermissionsService.kt not found, skip"; exit 0; fi
          EMC_VER=$(node -e "try{console.log(require('./node_modules/expo-modules-core/package.json').version)}catch(e){console.log('?')}")
          echo "expo-modules-core $EMC_VER — patching PermissionsService.kt:166"
          echo "=== lines 160-175 (before patch) ==="
          awk 'NR>=160&&NR<=175{printf "%3d: %s\n",NR,$0}' "$PERMS"
          # Surgical fix: if char at column 36 is '.', make it '?.' (null-safe call)
          # Fallback: replace the first 'permissions.' on that line with 'permissions?.'
          awk 'NR==166 {
            if (substr($0,36,1)==".") {
              print substr($0,1,35) "?." substr($0,37)
            } else {
              sub(/permissions\./, "permissions?.")
              sub(/grantResults\./, "grantResults?.")
              print $0
            }
            next
          } {print}' "$PERMS" > /tmp/ps_patched.kt && mv /tmp/ps_patched.kt "$PERMS"
          echo "=== line 166 after patch ==="
          awk 'NR==166{printf "%3d: %s\n",NR,$0}' "$PERMS"

      - name: Expo prebuild (generate android/)
        if: steps.detect.outputs.type == 'expo'
        working-directory: source
        run: npx expo prebuild --platform android --no-install

      - name: Fix Expo Kotlin compatibility
        if: steps.detect.outputs.type == 'expo'
        working-directory: source/android
        run: |
          # Expo SDK 51 + RN 0.74 targets Kotlin 1.9.22.
          # JDK 21 changes Java→Kotlin type inference, causing expo-modules-core
          # to fail to compile (Array<String!>? nullable receiver error).
          # JDK 17 (set above) avoids that; we still pin Kotlin to 1.9.22 to
          # match the version expo-modules-core was tested against.
          KOTLIN_VERSION="1.9.22"

          if [ -f "gradle.properties" ]; then
            if grep -q "kotlinVersion" gradle.properties; then
              sed -i "s/kotlinVersion=.*/kotlinVersion=$KOTLIN_VERSION/" gradle.properties
            else
              echo "kotlinVersion=$KOTLIN_VERSION" >> gradle.properties
            fi
            # Suppress JVM-target mismatch warnings becoming errors
            grep -q "kotlin.jvm.target.validation.mode" gradle.properties \
              || echo "kotlin.jvm.target.validation.mode=warning" >> gradle.properties
          fi

          # Patch Groovy Gradle scripts when present
          if [ -f "build.gradle" ]; then
            sed -i "s/ext.kotlinVersion = .*/ext.kotlinVersion = \"$KOTLIN_VERSION\"/" build.gradle
            sed -i "s/org.jetbrains.kotlin:kotlin-gradle-plugin:[0-9.][0-9.]*/org.jetbrains.kotlin:kotlin-gradle-plugin:$KOTLIN_VERSION/" build.gradle
          fi

          # Patch Kotlin plugin DSL versions in settings.gradle / settings.gradle.kts
          for f in settings.gradle settings.gradle.kts; do
            if [ -f "$f" ]; then
              sed -E -i "s/id\\([\"']org\\.jetbrains\\.kotlin\\.android[\"']\\) version [\"'][0-9.]+[\"']/id(\"org.jetbrains.kotlin.android\") version \"$KOTLIN_VERSION\"/g" "$f"
              sed -E -i "s/id\\([\"']org\\.jetbrains\\.kotlin\\.jvm[\"']\\) version [\"'][0-9.]+[\"']/id(\"org.jetbrains.kotlin.jvm\") version \"$KOTLIN_VERSION\"/g" "$f"
            fi
          done

          echo "=== Kotlin toolchain pinned to $KOTLIN_VERSION ==="
          for file in gradle.properties build.gradle settings.gradle settings.gradle.kts; do
            if [ -f "$file" ]; then
              echo "--- $file ---"
              grep -nE "kotlinVersion|kotlin-gradle-plugin|kotlin\.jvm\.target|org\\.jetbrains\\.kotlin\\.(android|jvm)" "$file" || true
            fi
          done

      - name: Build React Native / Expo APK
        if: (steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'react-native') && github.event.inputs.build_type == 'apk'
        working-directory: source/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build React Native / Expo AAB
        if: (steps.detect.outputs.type == 'expo' || steps.detect.outputs.type == 'react-native') && github.event.inputs.build_type == 'aab'
        working-directory: source/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      # ────────── Capacitor Setup ──────────

      - name: Set up Node.js (Capacitor)
        if: steps.detect.outputs.type == 'capacitor'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build Capacitor web app
        if: steps.detect.outputs.type == 'capacitor'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          echo "Running Capacitor build"
          npm install
          npm run build

      - name: Sync Capacitor Android project
        if: steps.detect.outputs.type == 'capacitor'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ] || [ ! -f "android/settings.gradle" ] || [ ! -f "android/app/build.gradle" ]; then
            echo "::warning::Capacitor android project missing or incomplete. Regenerating android/"
            rm -rf android
            npx cap add android
          fi

          npx cap sync android
          ls -la android
          ls -la android/app || true

      - name: Build Capacitor APK
        if: steps.detect.outputs.type == 'capacitor' && github.event.inputs.build_type == 'apk'
        working-directory: ${{ steps.detect.outputs.project_dir }}/android
        run: |
          java -version
          chmod +x gradlew
          ./gradlew --version
          ./gradlew assembleDebug

      - name: Build Capacitor AAB
        if: steps.detect.outputs.type == 'capacitor' && github.event.inputs.build_type == 'aab'
        working-directory: ${{ steps.detect.outputs.project_dir }}/android
        run: |
          java -version
          chmod +x gradlew
          ./gradlew --version
          ./gradlew bundleRelease

      # ────────── Native Gradle ──────────

      - name: Build Unity Android
        if: steps.detect.outputs.type == 'unity'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android

      - name: Build Gradle APK
        if: steps.detect.outputs.type == 'gradle' && github.event.inputs.build_type == 'apk'
        working-directory: source
        run: ./gradlew assembleRelease

      - name: Build Gradle AAB
        if: steps.detect.outputs.type == 'gradle' && github.event.inputs.build_type == 'aab'
        working-directory: source
        run: ./gradlew bundleRelease

      # ────────── Artifact & Callback ──────────

      - name: Find artifact
        id: artifact
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"

          if [ "$BUILD_TYPE" = "aab" ]; then
            ARTIFACT=$(find source -name "*.aab" -path "*/release/*" 2>/dev/null | head -1)
          else
            ARTIFACT=$(find source -name "*.apk" \( -path "*/debug/*" -o -path "*/release/*" \) 2>/dev/null | head -1)
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "No artifact found!" >&2
            find source -name "*.apk" -o -name "*.aab" | head -10
            exit 1
          fi

          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT
          if [[ "$ARTIFACT" == *"/android/app/build/outputs/apk/debug/"* ]]; then
            echo "Found Capacitor APK artifact: $ARTIFACT"
          fi
          echo "Found artifact: $ARTIFACT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 7

      - name: Notify callback
        if: always() && github.event.inputs.callback_url != ''
        run: |
          STATUS="completed"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS="failed"
          fi
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": \"${{ github.event.inputs.job_id }}\", \"status\": \"$STATUS\"}" \
            || true
