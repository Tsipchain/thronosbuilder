services:
  - type: web
    name: thronos-build-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: thronos-build-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: thronos-build-redis
          property: connectionString
      - key: PORT
        value: 3000
    healthCheckPath: /health

  - type: worker
    name: thronos-build-worker
    env: node
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: thronos-build-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: thronos-build-redis
          property: connectionString

databases:
  - name: thronos-build-db
    databaseName: thronos_build
    user: thronos

  - name: thronos-build-redis
    type: redis
